# =========================================================================
# nginx.conf · 爱的小窝 静态站点
# - gzip 压缩
# - 中文文件名正确编码
# - 静态文件缓存
# - SPA/多页回退（这里为多页站，回退到 404 而非 index，避免覆盖真实页面）
# =========================================================================

server {
    listen       7860;
    listen  [::]:7860;
    server_name  _;

    # 字符集
    charset utf-8;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json
               application/xml application/rss+xml image/svg+xml font/woff font/woff2
               application/vnd.ms-fontobject application/font-woff text/x-component;

    # ---------- 主站（故事集入口首页） ----------
    location = / {
        try_files /index.html =404;
    }

    # ---------- 爱的小窝（主入口） ----------
    # 访问 / 直达 lovenest 仪表盘
    location = /lovenest {
        return 301 /lovenest/index.html;
    }
    location /lovenest/ {
        # 多页静态站：先找文件，找不到返回 404（不回退到 index，避免错误命中）
        try_files $uri $uri/ =404;
    }

    # ---------- 婚拍决策手记 ----------
    location /wedding/ {
        try_files $uri $uri/ =404;
    }

    # ---------- 静态资源缓存 ----------
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico|mp3|mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------- markdown / json 不缓存（便于内容更新即时生效） ----------
    location ~* \.(?:md|json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    # ---------- 中文文件名支持（图片等） ----------
    location ~* \.(jpg|jpeg|png|gif|webp|heic)$ {
        try_files $uri $uri/ =404;
    }

    # ---------- 通用回退 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 安全头 ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 错误页 ----------
    error_page 404 /404.html;
    location = /404.html {
        internal;
        default_type text/html;
        return 404 "<!DOCTYPE html><meta charset=utf-8><title>404</title><body style='font-family:sans-serif;text-align:center;padding:80px 20px;background:#EDE6DA;color:#3A3631'><h1 style='font-family:serif'>404 · 走岔了</h1><p>这一页还没铺好。<br><a href='/' style='color:#A0607A'>回到故事集入口 →</a></p></body>";
    }
}
