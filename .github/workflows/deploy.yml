name: Deploy Love Nest to GitHub Pages

# push 到 main 分支自动构建并部署到 GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一分支串行部署，避免并发覆盖
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 纯静态站点，无需构建步骤。
      # 整个仓库根作为 Pages 源：
      #   /            → 求婚站 (index.html，保持不动)
      #   /lovenest/   → 爱的小窝 (仪表盘 + 6 模块)
      #   /wedding/    → 婚拍决策手记
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
